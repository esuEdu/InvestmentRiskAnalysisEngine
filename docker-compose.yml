services:
  postgres:
    container_name: investment_risk_analysis_db
    image: postgres:16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=risk_engine
    ports:
      - "5432:5432"

  rabbitMQ:
    image: rabbitmq:4.2-management
    container_name: investment_risk_analysis_rabbit
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
